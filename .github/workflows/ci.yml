name: CI

on:
  push:
    branches:
      - main
      - release/**
      - feature/**
      - fix/**
      - chore/**
      - docs/**
      - refactor/**
  pull_request:
    branches:
      - main
      - release/**
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

  PACK_PROJECTS: >
    src/MediaLens/MediaLens.csproj
    src/MediaLens.DependencyInjection/MediaLens.DependencyInjection.csproj

  GITHUB_FEED: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  NUGET_FEED: https://api.nuget.org/v3/index.json

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json
            Directory.Packages.props
            packages.lock.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration $CONFIGURATION --no-restore

      - name: Test
        run: dotnet test --configuration $CONFIGURATION --no-build --results-directory ./TestResults --report-trx --coverage --coverage-output-format cobertura --coverage-output ./TestResults/coverage.cobertura.xml

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ./TestResults/**/*.trx
          check_name: Test Results (${{ matrix.os }})
          comment_mode: always

      - name: Install ReportGenerator
        if: always() && matrix.os == 'ubuntu-latest'
        shell: bash
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        if: always() && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          export PATH="$PATH:/home/runner/.dotnet/tools"
          reportgenerator "-reports:./TestResults/**/coverage.cobertura.xml" "-targetdir:./CoverageReport" "-reporttypes:Html;MarkdownSummaryGithub"

      - name: Add coverage to job summary
        if: always() && matrix.os == 'ubuntu-latest'
        shell: bash
        run: cat ./CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Add coverage comment to PR
        if: always() && github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: ./CoverageReport/SummaryGithub.md

      - name: Upload coverage artifacts
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport

      - name: Pack prerelease NuGet packages
        if: matrix.os == 'ubuntu-latest' && github.event_name != 'pull_request' && github.event_name != 'release'
        shell: bash
        run: |
          latestTag=$(git describe --tags --abbrev=0 2>/dev/null || echo 0.0.1)
          runId=$GITHUB_RUN_ID
          packageVersion="${latestTag#v}-build.${runId}"

          mkdir -p ./artifacts

          for proj in $PACK_PROJECTS; do
            echo "Packing $proj with version $packageVersion"
            dotnet pack "$proj" --configuration "$CONFIGURATION" --no-restore --no-build --include-source --output ./artifacts -p:PackageVersion="$packageVersion"
          done

      - name: Upload NuGet artifacts
        if: matrix.os == 'ubuntu-latest' && github.event_name != 'pull_request' && github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg

  prerelease:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          name: nupkg

      - name: Push to GitHub Packages
        run: dotnet nuget push ./*.nupkg --source $GITHUB_FEED --no-symbols --skip-duplicate --api-key ${{ secrets.GITHUB_TOKEN }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json
            Directory.Packages.props
            packages.lock.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration $CONFIGURATION --no-restore

      - name: Create release NuGet packages
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Release version: $VERSION"

          mkdir -p ./nupkg

          for proj in $PACK_PROJECTS; do
            echo "Packing $proj with version $VERSION"
            dotnet pack "$proj" --configuration "$CONFIGURATION" --no-restore --no-build --include-source --output ./nupkg -p:PackageVersion="$VERSION" -p:PackageReleaseNotes="See full release notes at: https://github.com/${{ github.repository }}/releases/tag/v$VERSION"
          done

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --source $GITHUB_FEED --no-symbols --skip-duplicate --api-key ${{ secrets.GITHUB_TOKEN }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --source $NUGET_FEED --skip-duplicate --api-key ${{ secrets.NUGET_KEY }}